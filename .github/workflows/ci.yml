name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      SOURCE_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false
      - name: Validate exact event source
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! "$SOURCE_SHA" =~ ^[0-9a-f]{40}$ ]]; then
            echo "Event source must be a full lowercase commit SHA." >&2
            exit 1
          fi
          test "$(git rev-parse HEAD)" = "$SOURCE_SHA"
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm audit
      - name: Run release verification
        env:
          MOODARR_SECRETS_REQUIRE_BUILD: "true"
        run: npm run verify:release

  container-scan:
    name: Scan exact event source image
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      SOURCE_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
    steps:
      - name: Check out exact event source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false

      - name: Build exact event source image
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! "$SOURCE_SHA" =~ ^[0-9a-f]{40}$ ]]; then
            echo "Event source must be a full lowercase commit SHA." >&2
            exit 1
          fi
          test "$(git rev-parse HEAD)" = "$SOURCE_SHA"
          evidence_dir="$RUNNER_TEMP/moodarr-container-scan"
          mkdir -p "$evidence_dir"

          package_version="$(node -p "require('./package.json').version")"
          docker build \
            --build-arg "MOODARR_VERSION=$package_version" \
            --build-arg "MOODARR_BUILD_REVISION=$SOURCE_SHA" \
            --build-arg "MOODARR_BUILD_AI_PROVIDER_POLICY=none" \
            --tag moodarr:event-source-scan \
            .

          image_id="$(docker image inspect --format '{{.Id}}' moodarr:event-source-scan)"
          image_revision="$(docker image inspect --format '{{ index .Config.Labels "org.opencontainers.image.revision" }}' moodarr:event-source-scan)"
          test "$image_revision" = "$SOURCE_SHA"
          jq -n \
            --arg schemaVersion moodarr-container-scan-v1 \
            --arg sourceRevision "$SOURCE_SHA" \
            --arg packageVersion "$package_version" \
            --arg imageId "$image_id" \
            '{schemaVersion: $schemaVersion, sourceRevision: $sourceRevision, packageVersion: $packageVersion, imageId: $imageId}' \
            > "$evidence_dir/image-identity.json"

      - name: Install Trivy
        uses: aquasecurity/setup-trivy@81e514348e19b6112ce2a7e3ecbafe19c1e1f567 # v0.3.1
        with:
          version: v0.70.0
          cache: true

      - name: Record high and critical runtime findings
        shell: bash
        run: >-
          trivy image
          --scanners vuln
          --severity HIGH,CRITICAL
          --format json
          --output "$RUNNER_TEMP/moodarr-container-scan/trivy-high-critical.json"
          --exit-code 0
          --vex .vex/moodarr.openvex.json
          moodarr:event-source-scan

      - name: Summarize runtime findings
        shell: bash
        run: |
          jq -r '
            [.Results[]?.Vulnerabilities[]?]
            | unique_by([.VulnerabilityID, .PkgName])
            | if length == 0 then
                "No unsuppressed high or critical runtime findings."
              else
                .[] | "\(.Severity) \(.VulnerabilityID) package=\(.PkgName) status=\(.Status // "unknown") fixed=\(.FixedVersion // "unavailable")"
              end
          ' "$RUNNER_TEMP/moodarr-container-scan/trivy-high-critical.json"

      - name: Reject fixable high and critical runtime findings
        shell: bash
        run: >-
          trivy image
          --scanners vuln
          --severity HIGH,CRITICAL
          --ignore-unfixed
          --format json
          --output "$RUNNER_TEMP/moodarr-container-scan/trivy-actionable.json"
          --exit-code 1
          --vex .vex/moodarr.openvex.json
          moodarr:event-source-scan

      - name: Upload container-scan evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: container-scan-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            ${{ runner.temp }}/moodarr-container-scan/image-identity.json
            ${{ runner.temp }}/moodarr-container-scan/trivy-high-critical.json
            ${{ runner.temp }}/moodarr-container-scan/trivy-actionable.json
          if-no-files-found: error
          retention-days: 30
