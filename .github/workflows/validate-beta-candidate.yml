name: Validate beta candidate

on:
  workflow_dispatch:
    inputs:
      candidate_digest:
        description: Exact published candidate digest (sha256:<64 lowercase hex>)
        required: true
        type: string
      expected_revision:
        description: Exact 40-character candidate commit
        required: true
        type: string

permissions: {}

concurrency:
  group: beta-candidate-${{ inputs.expected_revision }}
  cancel-in-progress: false

jobs:
  authorize:
    name: Require default-branch workflow
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Require the default-branch workflow definition
        shell: bash
        env:
          WORKFLOW_REF: ${{ github.workflow_ref }}
          EXPECTED_WORKFLOW_REF: ${{ github.repository }}/.github/workflows/validate-beta-candidate.yml@refs/heads/main
        run: |
          set -euo pipefail
          if [[ "$WORKFLOW_REF" != "$EXPECTED_WORKFLOW_REF" ]]; then
            echo "Candidate validation must be dispatched from the workflow definition on refs/heads/main." >&2
            exit 1
          fi

  anonymous-pull:
    name: Require anonymous exact-digest pull
    needs: authorize
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions: {}
    steps:
      - name: Verify anonymous public candidate pull prerequisite
        shell: bash
        env:
          CANDIDATE_DIGEST: ${{ inputs.candidate_digest }}
          EXPECTED_REVISION: ${{ inputs.expected_revision }}
        run: |
          set -euo pipefail
          umask 077
          if [[ ! "$CANDIDATE_DIGEST" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "candidate_digest must be sha256:<64 lowercase hex>." >&2
            exit 1
          fi
          if [[ ! "$EXPECTED_REVISION" =~ ^[0-9a-f]{40}$ ]]; then
            echo "expected_revision must be a full lowercase commit SHA." >&2
            exit 1
          fi

          image_path="jremick/moodarr"
          temporary_dir="$(mktemp -d "$RUNNER_TEMP/moodarr-anonymous-prerequisite.XXXXXX")"
          trap 'rm -rf "$temporary_dir"' EXIT
          manifest="$temporary_dir/manifest.json"
          headers="$temporary_dir/headers.txt"
          token_response="$temporary_dir/token.json"
          manifest_accept="application/vnd.oci.image.index.v1+json, application/vnd.docker.distribution.manifest.list.v2+json, application/vnd.oci.image.manifest.v1+json, application/vnd.docker.distribution.manifest.v2+json"
          curl_retry=(--connect-timeout 10 --max-time 30 --retry 3 --retry-delay 1 --retry-max-time 60 --retry-all-errors)
          parse_ghcr_token() {
            jq -er -s '
              if length != 1 or (.[0] | type) != "object" then
                error("GHCR token response must contain exactly one JSON object")
              else
                .[0].token
                | if type != "string" then
                    error("GHCR token response token must be a string")
                  elif length == 0 or length > 16384 then
                    error("GHCR token response token length is invalid")
                  elif contains("\r") or contains("\n") then
                    error("GHCR token response token shape is invalid")
                  elif (test("^[A-Za-z0-9._~+/-]+={0,2}$") | not) then
                    error("GHCR token response token shape is invalid")
                  else
                    .
                  end
              end
            ' "$1"
          }

          curl "${curl_retry[@]}" --fail-with-body --silent --show-error --get \
            --data-urlencode "service=ghcr.io" \
            --data-urlencode "scope=repository:${image_path}:pull" \
            --output "$token_response" \
            https://ghcr.io/token
          anonymous_token="$(parse_ghcr_token "$token_response")"
          echo "::add-mask::$anonymous_token"
          curl "${curl_retry[@]}" --fail-with-body --silent --show-error \
            --header "Authorization: Bearer $anonymous_token" \
            --header "Accept: $manifest_accept" \
            --dump-header "$headers" \
            --output "$manifest" \
            "https://ghcr.io/v2/${image_path}/manifests/${CANDIDATE_DIGEST}"

          media_type="$(awk -F ': ' 'tolower($1) == "content-type" { sub(/\r$/, "", $2); print $2 }' "$headers" | tail -1)"
          registry_digest="$(awk -F ': ' 'tolower($1) == "docker-content-digest" { sub(/\r$/, "", $2); print $2 }' "$headers" | tail -1)"
          computed_digest="sha256:$(sha256sum "$manifest" | awk '{print $1}')"
          if [[ "$media_type" != "application/vnd.oci.image.index.v1+json" ]] \
              || [[ "$registry_digest" != "$CANDIDATE_DIGEST" ]] \
              || [[ "$computed_digest" != "$CANDIDATE_DIGEST" ]]; then
            echo "Anonymous GHCR pull did not return the exact public candidate OCI index." >&2
            exit 1
          fi

  clean-install:
    name: Clean Docker and Compose install
    needs: [authorize, anonymous-pull]
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    permissions:
      attestations: read
      contents: read
      packages: read
    steps:
      - name: Check out exact candidate source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ inputs.expected_revision }}
          persist-credentials: false
          fetch-depth: 0

      - name: Validate immutable candidate input
        id: candidate
        shell: bash
        env:
          CANDIDATE_DIGEST: ${{ inputs.candidate_digest }}
          EXPECTED_REVISION: ${{ inputs.expected_revision }}
        run: |
          set -euo pipefail
          if [[ ! "$CANDIDATE_DIGEST" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "candidate_digest must be sha256:<64 lowercase hex>." >&2
            exit 1
          fi
          if [[ ! "$EXPECTED_REVISION" =~ ^[0-9a-f]{40}$ ]]; then
            echo "expected_revision must be a full lowercase commit SHA." >&2
            exit 1
          fi
          test "$(git rev-parse HEAD)" = "$EXPECTED_REVISION"
          echo "image=ghcr.io/jremick/moodarr@$CANDIDATE_DIGEST" >> "$GITHUB_OUTPUT"

      - name: Prove candidate source is reachable from current main
        shell: bash
        env:
          EXPECTED_REVISION: ${{ inputs.expected_revision }}
        run: |
          set -euo pipefail
          resolved_revision="$(git rev-parse HEAD)"
          if [[ "$resolved_revision" != "$EXPECTED_REVISION" ]]; then
            echo "Checked-out candidate $resolved_revision does not match requested revision $EXPECTED_REVISION." >&2
            exit 1
          fi
          git fetch --no-tags --prune origin "+refs/heads/main:refs/remotes/origin/main"
          if ! git merge-base --is-ancestor "$EXPECTED_REVISION" origin/main; then
            echo "Candidate revision $EXPECTED_REVISION is not reachable from current origin/main." >&2
            exit 1
          fi

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: npm

      - name: Authenticate for candidate pull
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Bind candidate provenance and main ancestry
        shell: bash
        env:
          CANDIDATE_IMAGE: ${{ steps.candidate.outputs.image }}
          EXPECTED_REVISION: ${{ inputs.expected_revision }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          command -v gh >/dev/null
          git fetch --no-tags --prune origin "+refs/heads/main:refs/remotes/origin/main"
          git merge-base --is-ancestor "$EXPECTED_REVISION" origin/main
          attestation_report="$(mktemp "$RUNNER_TEMP/moodarr-attestation.XXXXXX")"
          trap 'rm -f "$attestation_report"' EXIT
          gh attestation verify "oci://$CANDIDATE_IMAGE" \
            --repo jremick/moodarr \
            --signer-workflow jremick/moodarr/.github/workflows/publish-image.yml \
            --signer-digest "$EXPECTED_REVISION" \
            --source-digest "$EXPECTED_REVISION" \
            --source-ref refs/heads/main \
            --deny-self-hosted-runners \
            --format json \
            > "$attestation_report"
          jq -e 'type == "array" and length > 0' "$attestation_report" >/dev/null
          rm -f "$attestation_report"
          trap - EXIT

      - run: npm ci

      - name: Validate clean Docker and Compose installs
        shell: bash
        env:
          CANDIDATE_IMAGE: ${{ steps.candidate.outputs.image }}
          EXPECTED_REVISION: ${{ inputs.expected_revision }}
          REPORT_PATH: ${{ runner.temp }}/moodarr-beta-clean-install.json
        run: |
          set -euo pipefail
          npm run --silent validate:beta-install -- \
            --candidate-image "$CANDIDATE_IMAGE" \
            --expected-version 0.1.0-beta.1 \
            --expected-revision "$EXPECTED_REVISION" \
            > "$REPORT_PATH"

      - name: Upload clean-install evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: beta-clean-install-${{ inputs.expected_revision }}
          path: ${{ runner.temp }}/moodarr-beta-clean-install.json
          if-no-files-found: error
          retention-days: 30

  upgrade-rollback:
    name: Alpha.21 upgrade and cold rollback
    needs: [authorize, anonymous-pull]
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    permissions:
      attestations: read
      contents: read
      packages: read
    steps:
      - name: Check out exact candidate source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ inputs.expected_revision }}
          persist-credentials: false
          fetch-depth: 0

      - name: Validate immutable candidate input
        id: candidate
        shell: bash
        env:
          CANDIDATE_DIGEST: ${{ inputs.candidate_digest }}
          EXPECTED_REVISION: ${{ inputs.expected_revision }}
        run: |
          set -euo pipefail
          if [[ ! "$CANDIDATE_DIGEST" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "candidate_digest must be sha256:<64 lowercase hex>." >&2
            exit 1
          fi
          if [[ ! "$EXPECTED_REVISION" =~ ^[0-9a-f]{40}$ ]]; then
            echo "expected_revision must be a full lowercase commit SHA." >&2
            exit 1
          fi
          test "$(git rev-parse HEAD)" = "$EXPECTED_REVISION"
          echo "image=ghcr.io/jremick/moodarr@$CANDIDATE_DIGEST" >> "$GITHUB_OUTPUT"

      - name: Prove candidate source is reachable from current main
        shell: bash
        env:
          EXPECTED_REVISION: ${{ inputs.expected_revision }}
        run: |
          set -euo pipefail
          resolved_revision="$(git rev-parse HEAD)"
          if [[ "$resolved_revision" != "$EXPECTED_REVISION" ]]; then
            echo "Checked-out candidate $resolved_revision does not match requested revision $EXPECTED_REVISION." >&2
            exit 1
          fi
          git fetch --no-tags --prune origin "+refs/heads/main:refs/remotes/origin/main"
          if ! git merge-base --is-ancestor "$EXPECTED_REVISION" origin/main; then
            echo "Candidate revision $EXPECTED_REVISION is not reachable from current origin/main." >&2
            exit 1
          fi

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: npm

      - name: Authenticate for candidate pull
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Bind candidate provenance and main ancestry
        shell: bash
        env:
          CANDIDATE_IMAGE: ${{ steps.candidate.outputs.image }}
          EXPECTED_REVISION: ${{ inputs.expected_revision }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          command -v gh >/dev/null
          git fetch --no-tags --prune origin "+refs/heads/main:refs/remotes/origin/main"
          git merge-base --is-ancestor "$EXPECTED_REVISION" origin/main
          attestation_report="$(mktemp "$RUNNER_TEMP/moodarr-attestation.XXXXXX")"
          trap 'rm -f "$attestation_report"' EXIT
          gh attestation verify "oci://$CANDIDATE_IMAGE" \
            --repo jremick/moodarr \
            --signer-workflow jremick/moodarr/.github/workflows/publish-image.yml \
            --signer-digest "$EXPECTED_REVISION" \
            --source-digest "$EXPECTED_REVISION" \
            --source-ref refs/heads/main \
            --deny-self-hosted-runners \
            --format json \
            > "$attestation_report"
          jq -e 'type == "array" and length > 0' "$attestation_report" >/dev/null
          rm -f "$attestation_report"
          trap - EXIT

      - run: npm ci

      - name: Validate alpha.21 upgrade and cold rollback
        shell: bash
        env:
          CANDIDATE_IMAGE: ${{ steps.candidate.outputs.image }}
          EXPECTED_REVISION: ${{ inputs.expected_revision }}
          REPORT_PATH: ${{ runner.temp }}/moodarr-beta-upgrade-rollback.json
        run: |
          set -euo pipefail
          npm run --silent validate:beta-upgrade -- \
            --candidate-image "$CANDIDATE_IMAGE" \
            --expected-version 0.1.0-beta.1 \
            --expected-revision "$EXPECTED_REVISION" \
            > "$REPORT_PATH"

      - name: Upload upgrade and rollback evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: beta-upgrade-rollback-${{ inputs.expected_revision }}
          path: ${{ runner.temp }}/moodarr-beta-upgrade-rollback.json
          if-no-files-found: error
          retention-days: 30

  supply-chain:
    name: Published digest supply-chain evidence
    needs: [authorize, anonymous-pull]
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      attestations: read
      contents: read
      packages: read
    steps:
      - name: Check out exact candidate source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ inputs.expected_revision }}
          persist-credentials: false
          fetch-depth: 0

      - name: Validate immutable candidate input
        id: candidate
        shell: bash
        env:
          CANDIDATE_DIGEST: ${{ inputs.candidate_digest }}
          EXPECTED_REVISION: ${{ inputs.expected_revision }}
        run: |
          set -euo pipefail
          if [[ ! "$CANDIDATE_DIGEST" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "candidate_digest must be sha256:<64 lowercase hex>." >&2
            exit 1
          fi
          if [[ ! "$EXPECTED_REVISION" =~ ^[0-9a-f]{40}$ ]]; then
            echo "expected_revision must be a full lowercase commit SHA." >&2
            exit 1
          fi
          test "$(git rev-parse HEAD)" = "$EXPECTED_REVISION"
          echo "image=ghcr.io/jremick/moodarr@$CANDIDATE_DIGEST" >> "$GITHUB_OUTPUT"

      - name: Prove candidate source is reachable from current main
        shell: bash
        env:
          EXPECTED_REVISION: ${{ inputs.expected_revision }}
        run: |
          set -euo pipefail
          resolved_revision="$(git rev-parse HEAD)"
          if [[ "$resolved_revision" != "$EXPECTED_REVISION" ]]; then
            echo "Checked-out candidate $resolved_revision does not match requested revision $EXPECTED_REVISION." >&2
            exit 1
          fi
          git fetch --no-tags --prune origin "+refs/heads/main:refs/remotes/origin/main"
          if ! git merge-base --is-ancestor "$EXPECTED_REVISION" origin/main; then
            echo "Candidate revision $EXPECTED_REVISION is not reachable from current origin/main." >&2
            exit 1
          fi

      - name: Verify anonymous public candidate pull
        shell: bash
        env:
          CANDIDATE_DIGEST: ${{ inputs.candidate_digest }}
          CANDIDATE_IMAGE: ${{ steps.candidate.outputs.image }}
        run: |
          set -euo pipefail
          umask 077
          image_path="jremick/moodarr"
          evidence_dir="$RUNNER_TEMP/moodarr-beta-supply-chain"
          mkdir -p "$evidence_dir"
          temporary_dir="$(mktemp -d "$RUNNER_TEMP/moodarr-anonymous-pull.XXXXXX")"
          trap 'rm -rf "$temporary_dir"' EXIT
          manifest="$temporary_dir/manifest.json"
          headers="$temporary_dir/headers.txt"
          token_response="$temporary_dir/token.json"
          manifest_accept="application/vnd.oci.image.index.v1+json, application/vnd.docker.distribution.manifest.list.v2+json, application/vnd.oci.image.manifest.v1+json, application/vnd.docker.distribution.manifest.v2+json"
          curl_retry=(--connect-timeout 10 --max-time 30 --retry 3 --retry-delay 1 --retry-max-time 60 --retry-all-errors)
          parse_ghcr_token() {
            jq -er -s '
              if length != 1 or (.[0] | type) != "object" then
                error("GHCR token response must contain exactly one JSON object")
              else
                .[0].token
                | if type != "string" then
                    error("GHCR token response token must be a string")
                  elif length == 0 or length > 16384 then
                    error("GHCR token response token length is invalid")
                  elif contains("\r") or contains("\n") then
                    error("GHCR token response token shape is invalid")
                  elif (test("^[A-Za-z0-9._~+/-]+={0,2}$") | not) then
                    error("GHCR token response token shape is invalid")
                  else
                    .
                  end
              end
            ' "$1"
          }

          curl "${curl_retry[@]}" --fail-with-body --silent --show-error --get \
            --data-urlencode "service=ghcr.io" \
            --data-urlencode "scope=repository:${image_path}:pull" \
            --output "$token_response" \
            https://ghcr.io/token
          anonymous_token="$(parse_ghcr_token "$token_response")"
          echo "::add-mask::$anonymous_token"
          curl "${curl_retry[@]}" --fail-with-body --silent --show-error \
            --header "Authorization: Bearer $anonymous_token" \
            --header "Accept: $manifest_accept" \
            --dump-header "$headers" \
            --output "$manifest" \
            "https://ghcr.io/v2/${image_path}/manifests/${CANDIDATE_DIGEST}"

          media_type="$(awk -F ': ' 'tolower($1) == "content-type" { sub(/\r$/, "", $2); print $2 }' "$headers" | tail -1)"
          registry_digest="$(awk -F ': ' 'tolower($1) == "docker-content-digest" { sub(/\r$/, "", $2); print $2 }' "$headers" | tail -1)"
          computed_digest="sha256:$(sha256sum "$manifest" | awk '{print $1}')"
          if [[ "$media_type" != "application/vnd.oci.image.index.v1+json" ]] \
              || [[ "$registry_digest" != "$CANDIDATE_DIGEST" ]] \
              || [[ "$computed_digest" != "$CANDIDATE_DIGEST" ]]; then
            echo "Anonymous GHCR pull did not return the exact public candidate OCI index." >&2
            exit 1
          fi

          jq -n \
            --arg candidateImage "$CANDIDATE_IMAGE" \
            --arg candidateDigest "$CANDIDATE_DIGEST" \
            --arg registryDigest "$registry_digest" \
            --arg manifestMediaType "$media_type" \
            '{
              schemaVersion: "moodarr-anonymous-candidate-pull-v1",
              candidateImage: $candidateImage,
              candidateDigest: $candidateDigest,
              registryDigest: $registryDigest,
              manifestMediaType: $manifestMediaType,
              anonymousPullVerified: true
            }' > "$evidence_dir/anonymous-pull.json"

      - name: Install verified Docker Buildx client
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash scripts/install-pinned-buildx.sh

      - name: Authenticate for candidate inspection
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Create pinned BuildKit builder
        id: buildx
        shell: bash
        env:
          BUILDKIT_IMAGE: moby/buildkit:v0.30.0@sha256:0168606be2315b7c807a03b3d8aa79beefdb31c98740cebdffdfeebf31190c9f
        run: |
          set -euo pipefail
          builder_name="moodarr-supply-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          docker buildx create \
            --name "$builder_name" \
            --driver docker-container \
            --driver-opt "image=$BUILDKIT_IMAGE" \
            --use >/dev/null
          inspect_output=""
          buildkit_version=""
          for attempt in 1 2 3; do
            if inspect_output="$(docker buildx inspect "$builder_name" --bootstrap 2>&1)"; then
              buildkit_version="$(awk '$1 == "BuildKit" && $2 == "version:" { print $3 }' <<<"$inspect_output")"
              if test "$buildkit_version" = "v0.30.0"; then
                break
              fi
            fi
            if [[ "$attempt" == "3" ]]; then
              printf '%s\n' "$inspect_output" >&2
              docker buildx rm -f "$builder_name" >/dev/null 2>&1 || true
              echo "Pinned BuildKit builder did not become ready after three attempts." >&2
              exit 1
            fi
            sleep "$attempt"
          done
          test "$buildkit_version" = "v0.30.0"
          echo "name=$builder_name" >> "$GITHUB_OUTPUT"

      - name: Bind candidate provenance and main ancestry
        shell: bash
        env:
          CANDIDATE_IMAGE: ${{ steps.candidate.outputs.image }}
          EXPECTED_REVISION: ${{ inputs.expected_revision }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          command -v gh >/dev/null
          git fetch --no-tags --prune origin "+refs/heads/main:refs/remotes/origin/main"
          git merge-base --is-ancestor "$EXPECTED_REVISION" origin/main
          attestation_report="$(mktemp "$RUNNER_TEMP/moodarr-attestation.XXXXXX")"
          trap 'rm -f "$attestation_report"' EXIT
          gh attestation verify "oci://$CANDIDATE_IMAGE" \
            --repo jremick/moodarr \
            --signer-workflow jremick/moodarr/.github/workflows/publish-image.yml \
            --signer-digest "$EXPECTED_REVISION" \
            --source-digest "$EXPECTED_REVISION" \
            --source-ref refs/heads/main \
            --deny-self-hosted-runners \
            --format json \
            > "$attestation_report"
          jq -e 'type == "array" and length > 0' "$attestation_report" >/dev/null
          rm -f "$attestation_report"
          trap - EXIT

      - name: Install Trivy
        uses: aquasecurity/setup-trivy@81e514348e19b6112ce2a7e3ecbafe19c1e1f567 # v0.3.1
        with:
          version: v0.70.0
          cache: true

      - name: Verify evidence toolchain identity
        shell: bash
        run: |
          set -euo pipefail
          buildx_version_output="$(docker buildx version)"
          buildx_version="$(awk 'NR == 1 { print $2 }' <<<"$buildx_version_output")"
          [[ "$buildx_version" == v0.34.1* ]]
          buildx_path="${DOCKER_CONFIG:-$HOME/.docker}/cli-plugins/docker-buildx"
          printf '%s  %s\n' "f1332ddb9010bd0b72628266c3a906d9a6979848033df4c8d9bd2cd113bae12b" "$buildx_path" | sha256sum --check --strict
          buildkit_inspect="$(docker buildx inspect --bootstrap)"
          buildkit_version="$(awk '$1 == "BuildKit" && $2 == "version:" { print $3 }' <<<"$buildkit_inspect")"
          test "$buildkit_version" = "v0.30.0"
          trivy_version_output="$(trivy --version)"
          scanner_version="$(awk 'NR == 1 && $1 == "Version:" { print $2 }' <<<"$trivy_version_output")"
          test "$scanner_version" = "0.70.0"

      - name: Verify published digest, image identity, SBOM, and provenance
        shell: bash
        env:
          CANDIDATE_IMAGE: ${{ steps.candidate.outputs.image }}
          CANDIDATE_DIGEST: ${{ inputs.candidate_digest }}
          EXPECTED_REVISION: ${{ inputs.expected_revision }}
          EXPECTED_VERSION: 0.1.0-beta.1
        run: |
          set -euo pipefail
          EVIDENCE_DIR="$RUNNER_TEMP/moodarr-beta-supply-chain"
          mkdir -p "$EVIDENCE_DIR"
          manifest="$EVIDENCE_DIR/manifest.json"
          image_config="$EVIDENCE_DIR/image-config.json"
          provenance="$EVIDENCE_DIR/provenance.json"
          sbom="$EVIDENCE_DIR/sbom.spdx.json"

          docker buildx imagetools inspect "$CANDIDATE_IMAGE" --raw > "$manifest"
          computed_digest="sha256:$(sha256sum "$manifest" | awk '{print $1}')"
          if [[ "$computed_digest" != "$CANDIDATE_DIGEST" ]]; then
            echo "Published manifest digest $computed_digest does not match $CANDIDATE_DIGEST." >&2
            exit 1
          fi

          docker buildx imagetools inspect "$CANDIDATE_IMAGE" --format '{{json .Image}}' > "$image_config"
          docker buildx imagetools inspect "$CANDIDATE_IMAGE" --format '{{json .Provenance}}' > "$provenance"
          docker buildx imagetools inspect "$CANDIDATE_IMAGE" --format '{{json .SBOM}}' > "$sbom"

          jq -e '
            .mediaType == "application/vnd.oci.image.index.v1+json"
            and ([.manifests[]? | select(.platform.os == "linux" and .platform.architecture == "amd64")] | length == 1)
            and ([.manifests[]? | select(.annotations["vnd.docker.reference.type"] != "attestation-manifest")] | length == 1)
            and ([.manifests[]? | select(.annotations["vnd.docker.reference.type"] == "attestation-manifest")] | length == 1)
            and all(.manifests[]?; (.digest | type) == "string" and (.digest | test("^sha256:[0-9a-f]{64}$")))
            and (
              [.manifests[]? | select(.annotations["vnd.docker.reference.type"] == "attestation-manifest")][0].annotations["vnd.docker.reference.digest"]
              == [.manifests[]? | select(.annotations["vnd.docker.reference.type"] != "attestation-manifest")][0].digest
            )
          ' "$manifest" >/dev/null

          jq -e --arg expected_version "$EXPECTED_VERSION" --arg expected_revision "$EXPECTED_REVISION" '
            .os == "linux"
            and .architecture == "amd64"
            and .config.Labels["org.opencontainers.image.version"] == $expected_version
            and .config.Labels["org.opencontainers.image.revision"] == $expected_revision
            and .config.Labels["org.opencontainers.image.source"] == "https://github.com/jremick/moodarr"
            and .config.Labels["org.opencontainers.image.licenses"] == "Apache-2.0"
            and .config.Labels["io.moodarr.ai-provider-policy"] == "none"
            and .config.Labels["io.moodarr.tmdb-content-policy"] == "none"
          ' "$image_config" >/dev/null

          jq -e --arg expected_revision "$EXPECTED_REVISION" '
            .SLSA.buildDefinition.buildType == "https://github.com/moby/buildkit/blob/master/docs/attestations/slsa-definitions.md"
            and .SLSA.runDetails.metadata.buildkit_metadata.vcs.source == "https://github.com/jremick/moodarr"
            and .SLSA.runDetails.metadata.buildkit_metadata.vcs.revision == $expected_revision
            and ((.SLSA.buildDefinition.resolvedDependencies | type) == "array")
            and ((.SLSA.buildDefinition.resolvedDependencies | length) > 0)
            and all(.SLSA.buildDefinition.resolvedDependencies[];
              (.uri | type) == "string"
              and (.uri | length) > 0
              and (.digest | type) == "object"
              and (.digest | length) > 0
              and all(.digest | to_entries[];
                (.key | type) == "string"
                and (.key | length) > 0
                and (.value | type) == "string"
                and (.value | test("^([0-9a-f]{40}|[0-9a-f]{64}|[0-9a-f]{128})$"))
              )
            )
            and ((.SLSA.runDetails.builder.id | type) == "string")
            and (.SLSA.runDetails.builder.id | test("^https://github[.]com/jremick/moodarr/actions/runs/[0-9]+/attempts/[0-9]+$"))
            and (((.SLSA.buildDefinition.internalParameters // {}) | keys | map(startswith("github_")) | any) | not)
          ' "$provenance" >/dev/null

          jq -e '
            .SPDX.spdxVersion == "SPDX-2.3"
            and .SPDX.SPDXID == "SPDXRef-DOCUMENT"
            and ((.SPDX.packages | type) == "array")
            and ((.SPDX.packages | length) > 0)
          ' "$sbom" >/dev/null

      - name: Scan the exact published candidate digest
        shell: bash
        env:
          CANDIDATE_IMAGE: ${{ steps.candidate.outputs.image }}
        run: |
          set -euo pipefail
          EVIDENCE_DIR="$RUNNER_TEMP/moodarr-beta-supply-chain"
          trivy image \
            --scanners vuln \
            --severity HIGH,CRITICAL \
            --format json \
            --output "$EVIDENCE_DIR/trivy-high-critical.json" \
            --exit-code 0 \
            --vex .vex/moodarr.openvex.json \
            "$CANDIDATE_IMAGE"
          trivy image \
            --scanners vuln \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --format json \
            --output "$EVIDENCE_DIR/trivy-actionable.json" \
            --exit-code 0 \
            --vex .vex/moodarr.openvex.json \
            "$CANDIDATE_IMAGE"
          trivy --version > "$EVIDENCE_DIR/trivy-version.txt"

      - name: Record compact supply-chain evidence and enforce policy
        shell: bash
        env:
          CANDIDATE_IMAGE: ${{ steps.candidate.outputs.image }}
          CANDIDATE_DIGEST: ${{ inputs.candidate_digest }}
          EXPECTED_REVISION: ${{ inputs.expected_revision }}
          EXPECTED_VERSION: 0.1.0-beta.1
        run: |
          set -euo pipefail
          EVIDENCE_DIR="$RUNNER_TEMP/moodarr-beta-supply-chain"
          manifest="$EVIDENCE_DIR/manifest.json"
          image_config="$EVIDENCE_DIR/image-config.json"
          provenance="$EVIDENCE_DIR/provenance.json"
          sbom="$EVIDENCE_DIR/sbom.spdx.json"
          anonymous_pull="$EVIDENCE_DIR/anonymous-pull.json"
          high_critical="$EVIDENCE_DIR/trivy-high-critical.json"
          actionable="$EVIDENCE_DIR/trivy-actionable.json"
          report="$EVIDENCE_DIR/supply-chain-report.json"

          for scan in "$high_critical" "$actionable"; do
            jq -e '
              type == "object"
              and .SchemaVersion == 2
              and ((.Results | type) == "array")
              and ((.Results | length) > 0)
              and all(.Results[];
                type == "object"
                and ((.Target | type) == "string")
                and ((.Target | length) > 0)
                and ((has("Vulnerabilities") | not) or .Vulnerabilities == null or (.Vulnerabilities | type) == "array")
              )
            ' "$scan" >/dev/null
          done
          jq -e --arg candidate_image "$CANDIDATE_IMAGE" --arg candidate_digest "$CANDIDATE_DIGEST" '
            .schemaVersion == "moodarr-anonymous-candidate-pull-v1"
            and .candidateImage == $candidate_image
            and .candidateDigest == $candidate_digest
            and .registryDigest == $candidate_digest
            and .manifestMediaType == "application/vnd.oci.image.index.v1+json"
            and .anonymousPullVerified == true
          ' "$anonymous_pull" >/dev/null

          high_critical_count="$(jq '[.Results[]?.Vulnerabilities[]?] | unique_by([.VulnerabilityID, .PkgName]) | length' "$high_critical")"
          actionable_count="$(jq '[.Results[]?.Vulnerabilities[]?] | unique_by([.VulnerabilityID, .PkgName]) | length' "$actionable")"
          sbom_package_count="$(jq '.SPDX.packages | length' "$sbom")"
          dependency_count="$(jq '.SLSA.buildDefinition.resolvedDependencies | length' "$provenance")"
          vex_digest="sha256:$(sha256sum .vex/moodarr.openvex.json | awk '{print $1}')"
          trivy_version_output="$(trivy --version)"
          scanner_version="$(awk 'NR == 1 && $1 == "Version:" { print $2 }' <<<"$trivy_version_output")"
          buildx_sha256="$(sha256sum "${DOCKER_CONFIG:-$HOME/.docker}/cli-plugins/docker-buildx" | awk '{print $1}')"

          jq -n \
            --arg candidateImage "$CANDIDATE_IMAGE" \
            --arg candidateDigest "$CANDIDATE_DIGEST" \
            --arg expectedRevision "$EXPECTED_REVISION" \
            --arg expectedVersion "$EXPECTED_VERSION" \
            --arg manifestMediaType "$(jq -r '.mediaType' "$manifest")" \
            --arg imageOs "$(jq -r '.os' "$image_config")" \
            --arg imageArchitecture "$(jq -r '.architecture' "$image_config")" \
            --arg buildType "$(jq -r '.SLSA.buildDefinition.buildType' "$provenance")" \
            --arg builderId "$(jq -r '.SLSA.runDetails.builder.id' "$provenance")" \
            --arg sbomFormat "$(jq -r '.SPDX.spdxVersion' "$sbom")" \
            --arg scannerVersion "$scanner_version" \
            --arg buildxSha256 "$buildx_sha256" \
            --arg vexDigest "$vex_digest" \
            --arg runUrl "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" \
            --argjson sbomPackageCount "$sbom_package_count" \
            --argjson resolvedDependencyCount "$dependency_count" \
            --argjson highCriticalCount "$high_critical_count" \
            --argjson actionableHighCriticalCount "$actionable_count" \
            '{
              schemaVersion: "moodarr-beta-supply-chain-v1",
              scope: "candidate-supply-chain-only",
              candidate: {
                image: $candidateImage,
                digest: $candidateDigest,
                expectedRevision: $expectedRevision,
                expectedVersion: $expectedVersion,
                manifestMediaType: $manifestMediaType,
                os: $imageOs,
                architecture: $imageArchitecture,
                anonymousPullVerified: true
              },
              provenance: {
                buildType: $buildType,
                builderId: $builderId,
                resolvedDependencyCount: $resolvedDependencyCount,
                vcsSourceMatched: true,
                sourceRevisionMatched: true,
                builderRecordValidated: true,
                resolvedDependenciesValidated: true,
                githubArtifactAttestationVerified: true
              },
              sbom: {
                format: $sbomFormat,
                packageCount: $sbomPackageCount,
                attachedToCandidateIndex: true
              },
              vulnerabilityPolicy: {
                scanner: "Trivy",
                scannerVersion: $scannerVersion,
                vexDigest: $vexDigest,
                highCriticalCount: $highCriticalCount,
                actionableHighCriticalCount: $actionableHighCriticalCount,
                rejectsFixableHighCritical: true
              },
              toolchain: {
                buildx: ("v0.34.1@sha256:" + $buildxSha256),
                buildkit: "v0.30.0@sha256:0168606be2315b7c807a03b3d8aa79beefdb31c98740cebdffdfeebf31190c9f",
                sbomGenerator: "docker/buildkit-syft-scanner@sha256:79e7b013cbec16bbb436f312819a49a4a57752b2270c1a9332ae1a10fcc82a68",
                trivyDatabaseMetadata: "trivy-version.txt"
              },
              workflowRun: $runUrl
            }' > "$report"

          {
            echo "### Published candidate supply-chain evidence"
            echo "- Candidate: \`$CANDIDATE_IMAGE\`"
            echo "- Anonymous external pull: exact candidate digest and OCI index verified without a GitHub credential"
            echo "- BuildKit provenance: build type and candidate VCS metadata matched; GitHub-run builder and content-addressed dependency record shapes validated"
            echo "- GitHub artifact attestation: repository, workflow, source/signer revision, branch ref, and hosted-runner policy verified for \`$EXPECTED_REVISION\`"
            echo "- SPDX packages: $sbom_package_count"
            echo "- High/critical findings: $high_critical_count total; $actionable_count fixable"
          } >> "$GITHUB_STEP_SUMMARY"

          if [[ "$actionable_count" != "0" ]]; then
            echo "Published candidate has $actionable_count fixable high/critical runtime finding(s)." >&2
            exit 1
          fi

      - name: Remove raw provenance evidence
        if: always()
        shell: bash
        run: rm -f "$RUNNER_TEMP/moodarr-beta-supply-chain/provenance.json"

      - name: Upload supply-chain evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: beta-supply-chain-${{ inputs.expected_revision }}
          path: |
            ${{ runner.temp }}/moodarr-beta-supply-chain/manifest.json
            ${{ runner.temp }}/moodarr-beta-supply-chain/image-config.json
            ${{ runner.temp }}/moodarr-beta-supply-chain/anonymous-pull.json
            ${{ runner.temp }}/moodarr-beta-supply-chain/sbom.spdx.json
            ${{ runner.temp }}/moodarr-beta-supply-chain/trivy-high-critical.json
            ${{ runner.temp }}/moodarr-beta-supply-chain/trivy-actionable.json
            ${{ runner.temp }}/moodarr-beta-supply-chain/trivy-version.txt
            ${{ runner.temp }}/moodarr-beta-supply-chain/supply-chain-report.json
          if-no-files-found: error
          retention-days: 30

      - name: Remove supply-chain builder
        if: ${{ always() && steps.buildx.outputs.name != '' }}
        shell: bash
        env:
          BUILDER_NAME: ${{ steps.buildx.outputs.name }}
        run: docker buildx rm "$BUILDER_NAME"
