name: Scheduled security checks

on:
  schedule:
    - cron: "53 18 * * 3"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: scheduled-security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-audit:
    name: Audit locked dependencies
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 24
          cache: npm

      - name: Audit package lock
        run: npm audit --audit-level=high

  container-scan:
    name: Scan runtime image
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Build runtime image
        run: >-
          docker build
          --build-arg MOODARR_VERSION=security-scan
          --build-arg MOODARR_BUILD_REVISION=${{ github.sha }}
          --build-arg MOODARR_BUILD_AI_PROVIDER_POLICY=none
          --build-arg MOODARR_BUILD_TMDB_CONTENT_POLICY=none
          --tag moodarr:security-scan
          .

      - name: Install Trivy
        uses: aquasecurity/setup-trivy@81e514348e19b6112ce2a7e3ecbafe19c1e1f567 # v0.3.1
        with:
          version: v0.70.0
          cache: true

      - name: Record high and critical runtime findings
        run: >-
          trivy image
          --scanners vuln
          --severity HIGH,CRITICAL
          --format json
          --output trivy-high-critical.json
          --exit-code 0
          --vex .vex/moodarr.openvex.json
          moodarr:security-scan

      - name: Summarize runtime findings
        run: |
          jq -r '
            [.Results[]?.Vulnerabilities[]?]
            | unique_by([.VulnerabilityID, .PkgName])
            | if length == 0 then
                "No unsuppressed high or critical runtime findings."
              else
                .[] | "\(.Severity) \(.VulnerabilityID) package=\(.PkgName) status=\(.Status // "unknown") fixed=\(.FixedVersion // "unavailable")"
              end
          ' trivy-high-critical.json

      - name: Reject fixable high and critical runtime findings
        run: >-
          trivy image
          --scanners vuln
          --severity HIGH,CRITICAL
          --ignore-unfixed
          --format json
          --output trivy-actionable.json
          --exit-code 1
          --vex .vex/moodarr.openvex.json
          moodarr:security-scan
