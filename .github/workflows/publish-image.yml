name: Publish container image

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Semver tag or full commit SHA; SHAs publish only a sha-* image tag"
        required: true
        default: "v0.1.0-beta.1"
        type: string

permissions: {}

concurrency:
  group: publish-image
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  authorize:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Require the default-branch workflow definition
        shell: bash
        env:
          WORKFLOW_REF: ${{ github.workflow_ref }}
          EXPECTED_WORKFLOW_REF: ${{ github.repository }}/.github/workflows/publish-image.yml@refs/heads/main
        run: |
          set -euo pipefail
          if [[ "$WORKFLOW_REF" != "$EXPECTED_WORKFLOW_REF" ]]; then
            echo "Publishing must be dispatched from the workflow definition on refs/heads/main." >&2
            exit 1
          fi

  verify:
    needs: authorize
    uses: ./.github/workflows/release-verify.yml
    with:
      ref: ${{ github.event.inputs.ref || github.ref }}

  publish:
    needs: [authorize, verify]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - name: Check out release source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: npm

      - name: Resolve image tags
        id: image
        shell: bash
        env:
          RELEASE_REF: ${{ github.event.inputs.ref || github.ref_name }}
          VERIFIED_SHA: ${{ needs.verify.outputs.commit_sha }}
        run: |
          set -euo pipefail
          resolved_sha="$(git rev-parse HEAD)"
          if [[ "$resolved_sha" != "$VERIFIED_SHA" ]]; then
            echo "Publish checkout $resolved_sha does not match verified commit $VERIFIED_SHA." >&2
            exit 1
          fi

          package_version="$(node -p "require('./package.json').version")"
          node - "$package_version" <<'NODE'
          const version = process.argv[2];
          const semver = /^(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)(?:-((?:0|[1-9]\d*|\d*[A-Za-z-][0-9A-Za-z-]*)(?:\.(?:0|[1-9]\d*|\d*[A-Za-z-][0-9A-Za-z-]*))*))?$/;
          if (!semver.test(version)) {
            console.error(`package.json version is not a strict SemVer release version: ${version}`);
            process.exit(1);
          }
          NODE

          candidate="${RELEASE_REF#refs/tags/}"
          if [[ "$candidate" == "v$package_version" ]]; then
            version_tag="$candidate"
            has_version_tag=true
          elif [[ "$RELEASE_REF" =~ ^[0-9a-fA-F]{40}$ ]]; then
            version_tag=""
            has_version_tag=false
          else
            echo "Ref must be a semver tag such as v0.1.0-beta.1 or a full 40-character commit SHA: $RELEASE_REF" >&2
            exit 1
          fi

          git fetch --no-tags origin '+refs/heads/main:refs/remotes/origin/main'
          if ! git merge-base --is-ancestor "$resolved_sha" origin/main; then
            echo "Verified commit $resolved_sha is not reachable from origin/main." >&2
            exit 1
          fi

          short_sha="$(git rev-parse --short=12 HEAD)"
          if [[ "$has_version_tag" == "true" ]]; then
            git fetch --tags origin
            if ! git show-ref --verify --quiet "refs/tags/$version_tag"; then
              echo "Release tag refs/tags/$version_tag does not exist." >&2
              exit 1
            fi
            tag_sha="$(git rev-parse "refs/tags/$version_tag^{commit}")"
            if [[ "$tag_sha" != "$resolved_sha" ]]; then
              echo "Release tag $version_tag resolves to $tag_sha, not verified commit $resolved_sha." >&2
              exit 1
            fi
            if grep -Fq "## $package_version - Unreleased" CHANGELOG.md \
              || grep -Fq "Moodarr is targeting \`$version_tag\`" README.md \
              || grep -Fq "Early public beta candidate" README.md \
              || grep -Fq "does not exist until the prerelease gate passes" README.md \
              || grep -Fq "beta.1 tag below is a promotion target" docs/UNRAID.md \
              || grep -Fq "The target is not published" docs/RELEASE.md \
              || grep -Fq "Until the first beta is published" docs/COMPATIBILITY.md \
              || grep -Fq "No public beta has been published yet" SECURITY.md \
              || grep -Fq "No public beta has been published yet" SUPPORT.md; then
              echo "Release promotion copy still marks $version_tag as an unpublished candidate." >&2
              exit 1
            fi
          fi
          image="${REGISTRY}/${IMAGE_NAME}"
          {
            echo "version_tag=$version_tag"
            echo "has_version_tag=$has_version_tag"
            echo "short_sha=$short_sha"
            echo "package_version=$package_version"
            echo "image=$image"
            echo "version_image=${version_tag:+$image:$version_tag}"
            echo "sha_image=$image:sha-$short_sha"
          } >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Refuse to overwrite an existing image tag
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PACKAGE_OWNER: ${{ github.repository_owner }}
          PACKAGE_NAME: ${{ github.event.repository.name }}
          VERSION_TAG: ${{ steps.image.outputs.version_tag }}
          SHA_TAG: sha-${{ steps.image.outputs.short_sha }}
        run: |
          set -euo pipefail
          tags_file="$(mktemp)"
          gh api --paginate "users/${PACKAGE_OWNER}/packages/container/${PACKAGE_NAME}/versions?per_page=100" \
            --jq '.[].metadata.container.tags[]' > "$tags_file"
          for tag in "$VERSION_TAG" "$SHA_TAG"; do
            if [[ -n "$tag" ]] && grep -Fxq "$tag" "$tags_file"; then
              echo "Container tag $tag already exists and will not be overwritten." >&2
              exit 1
            fi
          done

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        with:
          images: ${{ steps.image.outputs.image }}
          tags: |
            type=raw,value=${{ steps.image.outputs.version_tag }},enable=${{ steps.image.outputs.has_version_tag }}
            type=raw,value=sha-${{ steps.image.outputs.short_sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.description=Moodarr Plex and Seerr companion app
            org.opencontainers.image.licenses=Apache-2.0

      - name: Build and push image
        id: push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            MOODARR_VERSION=${{ steps.image.outputs.package_version }}
            MOODARR_BUILD_REVISION=${{ needs.verify.outputs.commit_sha }}
          provenance: mode=max
          sbom: true

      - name: Generate artifact attestation
        uses: actions/attest@f6bf1532d7d6793fce74eac584813a8eee607999 # v4
        with:
          subject-name: ${{ steps.image.outputs.image }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - name: Summarize image refs
        shell: bash
        env:
          VERSION_IMAGE: ${{ steps.image.outputs.version_image }}
          SHA_IMAGE: ${{ steps.image.outputs.sha_image }}
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          {
            echo "Published image refs:"
            if [[ -n "$VERSION_IMAGE" ]]; then echo "- $VERSION_IMAGE"; fi
            echo "- $SHA_IMAGE"
            echo "Digest: $DIGEST"
            echo "Verified commit: ${{ needs.verify.outputs.commit_sha }}"
          } >> "$GITHUB_STEP_SUMMARY"
