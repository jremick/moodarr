name: Publish container image

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      ref:
        description: "Semver tag or full commit SHA; SHAs publish only a sha-* image tag"
        required: true
        default: "v0.1.0-alpha.21"
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  verify:
    uses: ./.github/workflows/release-verify.yml
    with:
      ref: ${{ github.event.inputs.ref || github.ref }}

  publish:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - name: Check out release source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: npm

      - name: Resolve image tags
        id: image
        shell: bash
        env:
          RELEASE_REF: ${{ github.event.inputs.ref || github.ref_name }}
          VERIFIED_SHA: ${{ needs.verify.outputs.commit_sha }}
        run: |
          set -euo pipefail
          resolved_sha="$(git rev-parse HEAD)"
          if [[ "$resolved_sha" != "$VERIFIED_SHA" ]]; then
            echo "Publish checkout $resolved_sha does not match verified commit $VERIFIED_SHA." >&2
            exit 1
          fi

          candidate="${RELEASE_REF#refs/tags/}"
          if [[ "$candidate" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z][0-9A-Za-z.-]*)?$ ]]; then
            version_tag="$candidate"
            has_version_tag=true
          elif [[ "$RELEASE_REF" =~ ^[0-9a-fA-F]{40}$ ]]; then
            version_tag=""
            has_version_tag=false
          else
            echo "Ref must be a semver tag such as v0.1.0-alpha.21 or a full 40-character commit SHA: $RELEASE_REF" >&2
            exit 1
          fi

          short_sha="$(git rev-parse --short=12 HEAD)"
          package_version="$(node -p "require('./package.json').version")"
          if [[ "$has_version_tag" == "true" && "$version_tag" != "v$package_version" ]]; then
            echo "Release tag $version_tag does not match package version v$package_version." >&2
            exit 1
          fi
          image="${REGISTRY}/${IMAGE_NAME}"
          {
            echo "version_tag=$version_tag"
            echo "has_version_tag=$has_version_tag"
            echo "short_sha=$short_sha"
            echo "package_version=$package_version"
            echo "image=$image"
            echo "version_image=${version_tag:+$image:$version_tag}"
            echo "sha_image=$image:sha-$short_sha"
          } >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        with:
          images: ${{ steps.image.outputs.image }}
          tags: |
            type=raw,value=${{ steps.image.outputs.version_tag }},enable=${{ steps.image.outputs.has_version_tag }}
            type=raw,value=sha-${{ steps.image.outputs.short_sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.description=Moodarr Plex and Seerr companion app
            org.opencontainers.image.licenses=Apache-2.0

      - name: Build and push image
        id: push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            MOODARR_VERSION=${{ steps.image.outputs.package_version }}
            MOODARR_BUILD_REVISION=${{ needs.verify.outputs.commit_sha }}
          provenance: mode=max
          sbom: true

      - name: Generate artifact attestation
        uses: actions/attest@f6bf1532d7d6793fce74eac584813a8eee607999 # v4
        with:
          subject-name: ${{ steps.image.outputs.image }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - name: Summarize image refs
        shell: bash
        env:
          VERSION_IMAGE: ${{ steps.image.outputs.version_image }}
          SHA_IMAGE: ${{ steps.image.outputs.sha_image }}
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          {
            echo "Published image refs:"
            if [[ -n "$VERSION_IMAGE" ]]; then echo "- $VERSION_IMAGE"; fi
            echo "- $SHA_IMAGE"
            echo "Digest: $DIGEST"
            echo "Verified commit: ${{ needs.verify.outputs.commit_sha }}"
          } >> "$GITHUB_STEP_SUMMARY"
