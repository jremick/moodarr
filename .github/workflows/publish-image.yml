name: Publish container image

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      ref:
        description: "Git tag or SHA to publish"
        required: true
        default: "v0.1.0-alpha.11"
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - name: Check out release source
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Resolve image tags
        id: image
        shell: bash
        env:
          RELEASE_REF: ${{ github.event.inputs.ref || github.ref_name }}
        run: |
          set -euo pipefail
          tag="${RELEASE_REF#refs/tags/}"
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z][0-9A-Za-z.-]*)?$ ]]; then
            echo "Ref must resolve to a semver tag such as v0.1.0-alpha.11: $RELEASE_REF" >&2
            exit 1
          fi
          short_sha="$(git rev-parse --short=12 HEAD)"
          image="${REGISTRY}/${IMAGE_NAME}"
          {
            echo "tag=$tag"
            echo "short_sha=$short_sha"
            echo "image=$image"
            echo "version_image=$image:$tag"
            echo "sha_image=$image:sha-$short_sha"
          } >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.image.outputs.image }}
          tags: |
            type=raw,value=${{ steps.image.outputs.tag }}
            type=raw,value=sha-${{ steps.image.outputs.short_sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.description=Moodarr Plex and Seerr companion app
            org.opencontainers.image.licenses=Apache-2.0

      - name: Build and push image
        id: push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate artifact attestation
        uses: actions/attest@v4
        with:
          subject-name: ${{ steps.image.outputs.image }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - name: Summarize image refs
        shell: bash
        run: |
          {
            echo "Published image refs:"
            echo "- ${{ steps.image.outputs.version_image }}"
            echo "- ${{ steps.image.outputs.sha_image }}"
            echo "Digest: ${{ steps.push.outputs.digest }}"
          } >> "$GITHUB_STEP_SUMMARY"
