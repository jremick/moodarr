name: Release verification

on:
  workflow_call:
    inputs:
      ref:
        description: Exact semver tag or full commit SHA to verify
        required: true
        type: string
    outputs:
      commit_sha:
        description: Full commit SHA that passed the release gate
        value: ${{ jobs.verify.outputs.commit_sha }}

concurrency:
  group: release-verify-${{ inputs.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    permissions:
      contents: read
    outputs:
      commit_sha: ${{ steps.source.outputs.commit_sha }}
    steps:
      - name: Check out release source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ inputs.ref }}
          persist-credentials: false

      - name: Record verified source
        id: source
        shell: bash
        run: echo "commit_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - run: npm audit
      - run: npm run verify:release

  container-scan:
    name: Scan release-candidate runtime image
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Check out release source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ inputs.ref }}
          persist-credentials: false

      - name: Build exact release-candidate image
        shell: bash
        run: |
          set -euo pipefail
          package_version="$(node -p "require('./package.json').version")"
          commit_sha="$(git rev-parse HEAD)"
          docker build \
            --build-arg "MOODARR_VERSION=$package_version" \
            --build-arg "MOODARR_BUILD_REVISION=$commit_sha" \
            --build-arg "MOODARR_BUILD_AI_PROVIDER_POLICY=none" \
            --build-arg "MOODARR_BUILD_TMDB_CONTENT_POLICY=none" \
            --tag moodarr:release-scan \
            .

          test "$(docker image inspect --format '{{ index .Config.Labels "org.opencontainers.image.revision" }}' moodarr:release-scan)" = "$commit_sha"
          test "$(docker image inspect --format '{{ index .Config.Labels "io.moodarr.ai-provider-policy" }}' moodarr:release-scan)" = "none"
          test "$(docker image inspect --format '{{ index .Config.Labels "io.moodarr.tmdb-content-policy" }}' moodarr:release-scan)" = "none"

      - name: Install Trivy
        uses: aquasecurity/setup-trivy@81e514348e19b6112ce2a7e3ecbafe19c1e1f567 # v0.3.1
        with:
          version: v0.70.0
          cache: true

      - name: Record high and critical runtime findings
        run: >-
          trivy image
          --scanners vuln
          --severity HIGH,CRITICAL
          --format json
          --output trivy-high-critical.json
          --exit-code 0
          --vex .vex/moodarr.openvex.json
          moodarr:release-scan

      - name: Summarize runtime findings
        run: |
          jq -r '
            [.Results[]?.Vulnerabilities[]?]
            | unique_by([.VulnerabilityID, .PkgName])
            | if length == 0 then
                "No unsuppressed high or critical runtime findings."
              else
                .[] | "\(.Severity) \(.VulnerabilityID) package=\(.PkgName) status=\(.Status // "unknown") fixed=\(.FixedVersion // "unavailable")"
              end
          ' trivy-high-critical.json

      - name: Reject fixable high and critical runtime findings
        run: >-
          trivy image
          --scanners vuln
          --severity HIGH,CRITICAL
          --ignore-unfixed
          --format json
          --output trivy-actionable.json
          --exit-code 1
          --vex .vex/moodarr.openvex.json
          moodarr:release-scan
