name: Feature Request
description: Suggest a Moodarr improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What would this help you do?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
  - type: textarea
    id: constraints
    attributes:
      label: Constraints
      description: Note Plex, Seerr/Jellyseerr, Unraid, or privacy constraints that matter. Do not include secrets or private hostnames.
