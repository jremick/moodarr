name: Moodarr
options:
  bundleIdPrefix: ai.jarel
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
packages:
  MoodarrIOS:
    path: .
targets:
  Moodarr:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: App
    info:
      path: App/Info.plist
      properties:
        CFBundleURLTypes:
          - CFBundleURLName: ai.jarel.moodarr.auth
            CFBundleURLSchemes:
              - moodarr
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        NSLocalNetworkUsageDescription: Moodarr connects to your local Moodarr server over LAN or VPN.
        NSMicrophoneUsageDescription: Moodarr uses the microphone to dictate search prompts.
        NSSpeechRecognitionUsageDescription: Moodarr uses speech recognition to turn dictated watch moods into search prompts.
        UILaunchScreen:
          UIColorName: LaunchBackground
    dependencies:
      - package: MoodarrIOS
        product: MoodarrIOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.jarel.moodarr
        PRODUCT_NAME: Moodarr
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: App/Info.plist
        GENERATE_INFOPLIST_FILE: "NO"
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
schemes:
  Moodarr:
    build:
      targets:
        Moodarr: all
    run:
      config: Debug
    test:
      config: Debug
      targets: []
    archive:
      config: Release
